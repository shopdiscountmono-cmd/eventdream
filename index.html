<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Favicon (onglet navigateur) -->
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <!-- Icône iPhone / iPad (écran d'accueil) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Icônes Android / PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- Manifest PWA : permet "Ajouter à l'écran d'accueil" (nécessaire pour les notifications push sur iPhone) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="EventDream" />
    <!-- Active le mode "app" plein écran sans barre Safari une fois ajoutée à l'écran d'accueil -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />
    <title>EventDream</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
